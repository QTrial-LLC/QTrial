# Continuous integration for QTrial.
#
# Triggers on pushes to main and on every pull request. The job gates
# four things:
#
#   1. Code hygiene (cargo fmt --check, clippy -D warnings).
#   2. A cold workspace build.
#   3. Schema integrity (every .up.sql applies against a fresh Postgres
#      16, and the seed loader populates the reference tables without
#      error).
#   4. The default test suite (cargo test --workspace without the
#      integration-tests or testing features, which skips the
#      testcontainer-backed suites).
#
# The testcontainer-based integration tests (shared/tests/*.rs and
# workers/tests/seed_loader.rs) are intentionally not run by this
# workflow yet. They work locally via Docker Desktop but have produced
# sporadic flakes in GitHub Actions for other Rust projects; enabling
# them in CI is a separate decision that should land only after we
# see stable runs. The seed-loader binary step below exercises the
# same loader code path against the live service container, which
# provides end-to-end coverage without the testcontainers dependency.
#
# Service container: official postgres:16 image as `postgres` service.
# GitHub Actions services do not run docker-entrypoint-initdb.d the
# way docker-compose does, so the `Bootstrap qtrial roles` step runs
# the same SQL that db/docker-init/01-create-databases.sql contains.
# That script is the source of truth for local and test environments;
# drift between it and CI surfaces here first.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR when a new commit lands; no
# point holding the runner for stale work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, lint, migrate, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # The built-in healthcheck guarantees the service is responsive
        # before the first step reaches it.
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      # Target the qtrial database created by the bootstrap step.
      # Every later step reads this.
      DATABASE_URL: postgres://qtrial:qtrial@localhost:5432/qtrial
      # Rust hygiene knobs.
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
      # Keep tracing output compact in logs.
      QTRIAL_LOG_FORMAT: text
      RUST_LOG: info

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache cargo registry and build artifacts keyed on Cargo.lock.
      # Invalidation on lockfile change catches dependency upgrades;
      # retaining the target/ for other branches keeps PR feedback
      # fast without producing subtle cross-PR state dependencies.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (workspace)
        run: cargo build --workspace --locked

      - name: Bootstrap qtrial roles
        # The production schema expects two roles: qtrial (LOGIN, owns
        # every table) and qtrial_tenant (NOLOGIN, RLS target). The
        # service container starts with only the default postgres
        # superuser, so the CI job explicitly replays the role and
        # database setup from db/docker-init/01-create-databases.sql.
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
               -f db/docker-init/01-create-databases.sql

      - name: Apply migrations
        # sqlx-cli runs up migrations in timestamp order against the
        # qtrial database. Installing with --locked to keep CI reproducible.
        env:
          PGPASSWORD: qtrial
        run: |
          cargo install sqlx-cli --version 0.8 \
              --no-default-features --features postgres,rustls --locked
          sqlx migrate run --source db/migrations --database-url "$DATABASE_URL"

      - name: Run seed loader (smoke)
        # Exercises the loader binary end-to-end against the service
        # container. A second run validates idempotency: identical
        # summary rows with rows_inserted=0 across the board.
        run: |
          cargo run --locked -p qtrial-workers --bin qtrial-seed-loader -- db/seed/akc
          echo
          echo "==== second run: expect zero inserts ===="
          cargo run --locked -p qtrial-workers --bin qtrial-seed-loader -- db/seed/akc

      - name: cargo test (default features)
        # Runs compile-time tests that do not require the testcontainer
        # testing feature. The feature-gated integration suites are
        # out of CI for now; the seed-loader smoke step above covers
        # the loader's end-to-end behavior.
        run: cargo test --workspace --locked
